name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            arch_name: windows-x86_64
            ext: .exe
            use_cross: false

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch_name: linux-x86_64
            ext: ""
            use_cross: false

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            arch_name: linux-arm64
            ext: ""
            use_cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/xunfei-image-gen${{ matrix.ext }} dist/
          cp README.md dist/
          cp LICENSE dist/
          cp config.yaml.example dist/

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a XunFeiMassImage-${{ matrix.arch_name }}.zip ./dist/*
          else
            zip -r XunFeiMassImage-${{ matrix.arch_name }}.zip dist/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: XunFeiMassImage-${{ matrix.arch_name }}
          path: XunFeiMassImage-${{ matrix.arch_name }}.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
